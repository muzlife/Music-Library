<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hahahoho — Operations Login</title>
  
  <!-- Premium Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-main: oklch(0.12 0.015 240);
      --bg-gradient: radial-gradient(circle at top left, oklch(0.18 0.025 245), oklch(0.08 0.01 240));
      
      --surface-glass: rgba(18, 24, 38, 0.55);
      --surface-border: rgba(255, 255, 255, 0.07);
      
      --text-primary: oklch(0.97 0.005 240);
      --text-secondary: oklch(0.78 0.015 240);
      --text-muted: oklch(0.55 0.015 240);
      
      --accent-cyan: oklch(0.70 0.18 190);
      --accent-cyan-glow: rgba(6, 182, 212, 0.25);
      --accent-indigo: oklch(0.60 0.22 265);
      --accent-indigo-glow: rgba(99, 102, 241, 0.25);
      
      --danger: oklch(0.62 0.18 25);
      --radius-lg: 20px;
      --radius-md: 12px;
      --transition-std: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 100%;
      min-height: 100vh;
      background: var(--bg-main);
      background-image: var(--bg-gradient);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow: hidden;
    }

    .login-container {
      background: var(--surface-glass);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-lg);
      padding: 40px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 30px;
      position: relative;
    }

    /* Ambient Glow behind the card */
    .login-container::before {
      content: '';
      position: absolute;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, var(--accent-cyan-glow) 0%, transparent 70%);
      top: -60px;
      right: -60px;
      pointer-events: none;
      z-index: -1;
    }

    .login-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      text-align: center;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
      border-radius: var(--radius-md);
      display: grid;
      place-items: center;
      box-shadow: 0 0 20px var(--accent-indigo-glow);
      margin-bottom: 8px;
    }

    .logo-title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(to right, var(--text-primary), var(--text-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .login-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 18px;
    }

    .form-group label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-field {
      width: 100%;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--surface-border);
      border-radius: var(--radius-md);
      padding: 12px 16px 12px 42px;
      font-size: 0.95rem;
      color: var(--text-primary);
      transition: var(--transition-std);
    }

    .input-field:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.15);
      background: rgba(0, 0, 0, 0.3);
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text-muted);
      pointer-events: none;
      transition: var(--transition-std);
    }

    .input-field:focus + .input-icon {
      color: var(--accent-cyan);
    }

    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-indigo), var(--accent-cyan));
      border: none;
      border-radius: var(--radius-md);
      font-size: 0.95rem;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(99, 102, 241, 0.2);
      transition: var(--transition-std);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }

    .btn-submit:hover:not(:disabled) {
      box-shadow: 0 6px 20px rgba(6, 182, 212, 0.35);
      transform: translateY(-1px);
    }

    .btn-submit:active:not(:disabled) {
      transform: translateY(1px);
    }

    .btn-submit:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status-message {
      min-height: 20px;
      font-size: 0.8rem;
      text-align: center;
      transition: var(--transition-std);
    }

    .status-error {
      color: var(--danger);
      text-shadow: 0 0 10px rgba(239, 68, 68, 0.1);
    }

    .status-loading {
      color: var(--accent-cyan);
    }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <img src="/ui-static/images/logo-hahahoho.png" alt="hahahoho" style="height: 48px; width: auto; margin-bottom: 16px; display: block; margin-left: auto; margin-right: auto;" />
      <p class="login-subtitle">Operations Shell — 현장 전용 운영 시스템</p>
    </div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="username">Operator ID</label>
        <div class="input-wrapper">
          <input type="text" class="input-field" id="username" name="username" autocomplete="username" placeholder="아이디 입력" required>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
        </div>
      </div>

      <div class="form-group" style="margin-bottom: 24px;">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input type="password" class="input-field" id="password" name="password" autocomplete="current-password" placeholder="비밀번호 입력" required>
          <div class="input-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        <span class="spinner" id="btnSpinner"></span>
        <span id="btnText">로그인</span>
      </button>
    </form>

    <div class="status-message" id="statusMessage"></div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('loginForm');
      const submitBtn = document.getElementById('submitBtn');
      const btnSpinner = document.getElementById('btnSpinner');
      const btnText = document.getElementById('btnText');
      const statusMessage = document.getElementById('statusMessage');
      const usernameInput = document.getElementById('username');

      usernameInput.focus();

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = usernameInput.value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
          statusMessage.textContent = '아이디와 비밀번호를 모두 입력해주세요.';
          statusMessage.className = 'status-message status-error';
          return;
        }

        // Set loading state
        submitBtn.disabled = true;
        btnSpinner.style.display = 'block';
        btnText.textContent = '인증 중...';
        statusMessage.textContent = '';
        statusMessage.className = 'status-message';

        try {
          const payload = new URLSearchParams({ username, password });
          const res = await fetch('/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: payload.toString()
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.detail || '로그인에 실패했습니다.');
          }

          // Successful authentication -> redirect to ops shell
          statusMessage.textContent = '인증 성공! 이동 중...';
          statusMessage.className = 'status-message status-loading';
          
          setTimeout(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const nextParam = urlParams.get('next');
            if (nextParam && nextParam.startsWith('/')) {
              window.location.replace(nextParam);
            } else {
              window.location.replace('/ops');
            }
          }, 600);

        } catch (err) {
          statusMessage.textContent = err.message;
          statusMessage.className = 'status-message status-error';
          submitBtn.disabled = false;
          btnSpinner.style.display = 'none';
          btnText.textContent = '로그인';
        }
      });
    });
  </script>
</body>
</html>
