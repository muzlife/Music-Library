<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>카페 운영</title>
<style>
:root{--bg:#0a1016;--surface:rgba(22,29,38,0.98);--border:rgba(132,148,170,0.22);--text:#eef3f8;--muted:#b3bfcc;--accent:#e8620a;--green:#22c55e;--yellow:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:16px}
h1{font-size:1.2rem;margin-bottom:4px}
.sub{color:var(--muted);font-size:.8rem;margin-bottom:12px}
.board{display:flex;gap:10px;min-height:50vh}
.col{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column}
.col h2{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between}
.col h2 span{color:var(--text)}
.card{background:rgba(132,148,170,0.04);border:1px solid rgba(132,148,170,0.1);border-radius:8px;padding:8px;margin-bottom:6px}
.card .ct{font-size:.8rem;font-weight:500;margin-bottom:2px}
.card .cm{font-size:.68rem;color:var(--muted);display:flex;gap:6px;align-items:center}
.card .table{background:rgba(232,98,10,0.15);color:var(--accent);padding:1px 6px;border-radius:3px;font-size:.62rem}
.card .src{font-size:.62rem;color:var(--muted)}
.card .btns{margin-top:4px;display:flex;gap:4px}
.card .btns button{padding:3px 10px;font-size:.68rem;border:1px solid var(--border);border-radius:4px;background:var(--surface);color:var(--text);cursor:pointer}
.card .btns .play{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.25);color:var(--green)}
.card .btns .local{background:rgba(245,158,11,0.1);color:var(--yellow)}
.card .btns .done{background:rgba(132,148,170,0.08)}
.card .btns .hold{color:var(--yellow)}
.bar{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-top:10px}
.bar .now{flex:1;font-size:.82rem;font-weight:500}
.bar .src{font-size:.68rem;color:var(--muted)}
.bar button{padding:6px 12px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;cursor:pointer;font-size:.75rem}
.bar button:hover{background:rgba(232,98,10,0.1)}
.feed{max-height:120px;overflow-y:auto;margin-top:8px;padding:6px 10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:.7rem;color:var(--muted)}
.feed .item{margin-bottom:2px}
.feed .tn{color:var(--accent);font-weight:500}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.card.new{animation:slide .3s}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:.75rem}
</style>
</head>
<body>
<div class="app">
<h1>☕ 카페 운영</h1>
<div class="sub" id="status">연결 중...</div>
<div class="board">
  <div class="col"><h2>대기 <span id="nw">0</span></h2><div id="waiting"></div></div>
  <div class="col"><h2>처리중 <span id="np">0</span></h2><div id="playing"></div></div>
  <div class="col"><h2>완료 <span id="nd">0</span></h2><div id="done"></div></div>
</div>
<div class="bar">
  <div class="now" id="nowTitle">재생 중인 곡 없음</div>
  <div class="src" id="nowSrc"></div>
  <button onclick="ctrl('pause')" title="일시정지">⏸</button>
  <button onclick="ctrl('stop')" title="정지">⏹</button>
</div>
<div class="feed" id="feed"><div class="empty">반응 피드</div></div>
</div>

<div style="margin-top:12px;display:flex;gap:10px">
  <div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 style="font-size:.8rem;color:var(--muted);margin:0;text-transform:uppercase;letter-spacing:.04em">📋 재생목록</h2>
      <button onclick="newPlaylist()" style="background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:4px;font-size:.7rem;cursor:pointer">+ 새 목록</button>
    </div>
    <select id="plSelect" onchange="loadPlaylist()" style="width:100%;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:.75rem;margin-bottom:6px"><option value="">선택...</option></select>
    <div id="plItems" style="max-height:200px;overflow-y:auto"></div>
    <div id="plControls" style="display:none;margin-top:6px;display:flex;gap:4px">
      <button onclick="plPlay(0)" style="flex:1;padding:6px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:var(--green);border-radius:4px;font-size:.7rem;cursor:pointer">▶️ 재생</button>
      <button onclick="plNext()" style="flex:1;padding:6px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:4px;font-size:.7rem;cursor:pointer">⏭ 다음</button>
      <button onclick="delPlaylist()" style="padding:6px 10px;background:rgba(239,68,68,0.1);border:1px solid var(--border);color:#ef4444;border-radius:4px;font-size:.7rem;cursor:pointer">삭제</button>
    </div>
  </div>
</div>
<script>
var _plIdx = 0;
function loadPlaylists(){
  api('/ops/cafe/playlists').then(function(d){
    var s = document.getElementById('plSelect');
    s.innerHTML = '<option value="">선택...</option>';
    (d.items||[]).forEach(function(p){ s.innerHTML += '<option value="'+p.id+'">'+p.name+' ('+p.item_count+')</option>'; });
  });
}

function newPlaylist(){
  var n = prompt('재생목록 이름:');
  if(!n) return;
  api('/ops/cafe/playlists',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n})}).then(function(){loadPlaylists();});
}

function loadPlaylist(){
  var id = document.getElementById('plSelect').value;
  if(!id){ document.getElementById('plItems').innerHTML=''; return; }
  document.getElementById('plControls').style.display = 'flex';
  api('/ops/cafe/playlists/'+id).then(function(d){
    document.getElementById('plItems').innerHTML = (d.items||[]).map(function(it,i){
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(132,148,170,0.06);font-size:.72rem">'+
        '<span style="flex:1">'+(it.spotify_track_uri?'🎵':'💿')+' '+it.title+' - '+it.artist+'</span>'+
        '<button onclick="plRemove('+it.id+')" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:.65rem">✕</button></div>';
    }).join('');
  });
}

function plRemove(itemId){
  var plId = document.getElementById('plSelect').value;
  api('/ops/cafe/playlists/'+plId+'/items/'+itemId,{method:'DELETE'}).then(loadPlaylist);
}

function plPlay(idx){ _plIdx = idx;
  var plId = document.getElementById('plSelect').value;
  api('/ops/cafe/playlists/'+plId+'/play-next',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({current_index:idx-1})});
}

function plNext(){ _plIdx++; plPlay(_plIdx); }

function delPlaylist(){
  var plId = document.getElementById('plSelect').value;
  if(!confirm('삭제하시겠습니까?')) return;
  api('/ops/cafe/playlists/'+plId,{method:'DELETE'}).then(function(){loadPlaylists();document.getElementById('plItems').innerHTML='';});
}

function addToPlaylist(title,artist,spotifyId,spotifyUri,localPath,artUrl){
  var plId = document.getElementById('plSelect').value;
  if(!plId){ alert('재생목록을 먼저 선택하세요'); return; }
  api('/ops/cafe/playlists/'+plId+'/items',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title,artist:artist,spotify_track_id:spotifyId,spotify_track_uri:spotifyUri,local_file_path:localPath,album_art_url:artUrl})}).then(loadPlaylist);
}

loadPlaylists();
</script>

<script>
var _all = [];
var _ws = null;
var _emoji = {LOVE:'💕',VIBE:'☕',SIMILAR:'🎵',WEATHER:'🌧️',CUSTOM:'✍️'};

function api(p,o){
  o=o||{};o.credentials='include';
  return fetch(p,o).then(function(r){return r.ok?r.json():Promise.reject(r)});
}

function load(){
  api('/ops/cafe/queue').then(function(d){
    _all = d.items||[];
    render();
    document.getElementById('status').textContent = '총 '+_all.length+'건';
  });
}

function render(){
  var w=[],p=[],d=[];
  _all.forEach(function(r){
    if(r.status==='REQUESTED') w.push(r);
    else if(r.status==='PLAYING') p.push(r);
    else d.push(r);
  });
  document.getElementById('waiting').innerHTML = w.map(card).join('')||'<div class=empty>없음</div>';
  document.getElementById('playing').innerHTML = p.map(card).join('')||'<div class=empty>없음</div>';
  document.getElementById('done').innerHTML = d.slice(0,15).map(card).join('')||'<div class=empty>없음</div>';
  document.getElementById('nw').textContent = w.length;
  document.getElementById('np').textContent = p.length;
  document.getElementById('nd').textContent = d.length;
  if(p.length){ document.getElementById('nowTitle').textContent = p[0].requested_track||''; }
}

function card(r){
  var isSpotify = (r.customer_note||'').indexOf('spotify')>=0;
  var isLocal = (r.customer_note||'').indexOf('local')>=0;
  var src = isSpotify?'🎵':isLocal?'💿':'';
  var table = (r.customer_note||'').replace(' / spotify','').replace(' / local','');
  var a = '';
  if(r.status==='REQUESTED') a = '<button class=play onclick="act('+r.id+',\'play\',\''+(isLocal?'local':'spotify')+'\')">재생</button><button class=hold onclick="act('+r.id+',\'hold\')">보류</button>';
  else if(r.status==='PLAYING') a = '<button class=done onclick="act('+r.id+',\'complete\')">완료</button>';
  return '<div class=card><div class=ct>'+src+' '+(r.requested_track||'').replace(/</g,'').substring(0,60)+'</div><div class=cm><span class=table>'+table+'</span></div><div class=btns>'+a+'</div></div>';
}

function act(id, action, source){
  if(action==='play' && source==='spotify') api('/ops/cafe/play/'+id,{method:'POST'}).then(load);
  else if(action==='play' && source==='local') api('/ops/cafe/play-local',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({request_id:id})}).then(load);
  else if(action==='complete') api('/ops/cafe/complete/'+id,{method:'POST'}).then(load);
  else if(action==='hold') {} // just leave in waiting
}

function ctrl(cmd){
  if(cmd==='pause') api('/ops/cafe/pause',{method:'POST'});
  else if(cmd==='stop'){ api('/ops/cafe/pause',{method:'POST'}); api('/ops/cafe/stop-local',{method:'POST'}); }
}

function wsConnect(){
  var p = location.protocol==='https:'?'wss':'ws';
  _ws = new WebSocket(p+'://'+location.host+'/ws/cafe?role=staff');
  _ws.onopen = function(){ document.getElementById('status').textContent = '연결됨'; };
  _ws.onmessage = function(e){
    var d = JSON.parse(e.data);
    if(d.event==='track_request') load();
    if(d.event==='reaction'){
      var f = document.getElementById('feed');
      var em = _emoji[d.reaction_type]||'';
      var txt = d.free_text||'';
      f.innerHTML = '<div class=item><span class=tn>'+d.table_number+'</span> '+em+' '+txt+'</div>' + f.innerHTML;
    }
  };
  _ws.onclose = function(){ document.getElementById('status').textContent = '재연결 중...'; setTimeout(wsConnect,3000); };
}

load(); wsConnect();
setInterval(load, 10000);
</script>
</body>
</html>
