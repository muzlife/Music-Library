<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>카페 태블릿</title>
<style>
:root{--bg:#0a0f14;--surface:rgba(20,28,36,0.96);--border:rgba(132,148,170,0.18);--text:#eef3f8;--muted:#8899aa;--accent:#f07b3f;--accent-soft:rgba(240,123,63,0.12)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{padding:12px 16px;flex-shrink:0}
.top input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.95rem;outline:none}
.top input:focus{border-color:var(--accent)}
.results{flex:1;overflow-y:auto;padding:0 16px 16px}
.card{display:flex;align-items:center;gap:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.card img{width:48px;height:48px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(132,148,170,0.1)}
.card .info{flex:1;min-width:0}
.card .title{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:.72rem;color:var(--muted)}
.card button{flex-shrink:0;padding:6px 12px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.75rem;cursor:pointer}
.bottom{flex-shrink:0;display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--surface);border-top:1px solid var(--border)}
.bottom img{width:40px;height:40px;border-radius:6px;object-fit:cover}
.bottom .binfo{flex:1;min-width:0}
.bottom .btitle{font-size:.78rem;font-weight:500}
.bottom .bartist{font-size:.68rem;color:var(--muted)}
.empty{text-align:center;padding:32px;color:var(--muted);font-size:.8rem}
.loading{text-align:center;padding:20px;color:var(--muted)}
</style>
</head>
<body>
<div class="top"><input type="text" id="q" placeholder="곡명 또는 아티스트 검색..." autocomplete="off" oninput="search()"></div>
<div class="results" id="results"><div class="empty">검색어를 입력하세요</div></div>
<div class="bottom">
  <img id="bartImg" src="" onerror="this.style.display='none'" style="display:none">
  <div class="binfo">
    <div class="btitle" id="bartTitle">재생 중인 곡 없음</div>
    <div class="bartist" id="bartArtist"></div>
  </div>
</div>
<script>
var DEVICE_ID = localStorage.getItem('cafe_device_id') || (function(){var id=crypto.randomUUID();localStorage.setItem('cafe_device_id',id);return id})();
var timer = null;

function search(){
  clearTimeout(timer);
  var q = document.getElementById('q').value.trim();
  if(q.length < 1){
    document.getElementById('results').innerHTML = '<div class="empty">검색어를 입력하세요</div>';
    return;
  }
  document.getElementById('results').innerHTML = '<div class="loading">검색중...</div>';
  timer = setTimeout(function(){
    fetch('/cafe/search?q='+encodeURIComponent(q)+'&limit=15')
      .then(function(r){return r.json()})
      .then(function(d){
        if(!d.items || !d.items.length){
          document.getElementById('results').innerHTML = '<div class="empty">검색 결과 없음</div>';
          return;
        }
        var h = '';
        for(var i=0;i<d.items.length;i++){
          var it = d.items[i];
          h += '<div class="card">';
          if(it.album_art_url) h += '<img src="'+it.album_art_url+'" alt="">';
          else h += '<div style="width:48px;height:48px;border-radius:6px;background:rgba(132,148,170,0.1);flex-shrink:0"></div>';
          h += '<div class="info"><div class="title">'+it.title+'</div><div class="meta">'+it.artist+'</div></div>';
          h += '<button onclick="req('+i+')">신청</button>';
          h += '</div>';
        }
        window._lastResults = d.items;
        document.getElementById('results').innerHTML = h;
      })
      .catch(function(e){
        document.getElementById('results').innerHTML = '<div class="empty">오류: '+e+'</div>';
      });
  }, 300);
}

function req(idx){
  var it = window._lastResults[idx];
  fetch('/cafe/request',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-device-id':DEVICE_ID},
    body:JSON.stringify({track_title:it.title,artist:it.artist,album_art_url:it.album_art_url||null,source:it.source,spotify_track_id:it.spotify_track_id||null,owned_item_id:it.owned_item_id||null})
  }).then(function(r){return r.json()}).then(function(){alert('요청 접수 완료!')}).catch(function(){alert('요청 실패')});
}

setInterval(function(){
  fetch('/cafe/now-playing').then(function(r){return r.json()}).then(function(d){
    if(d.available){
      document.getElementById('bartTitle').textContent = d.title;
      document.getElementById('bartArtist').textContent = d.artist;
      if(d.album_art_url){document.getElementById('bartImg').src=d.album_art_url;document.getElementById('bartImg').style.display='';}
    }
  }).catch(function(){});
}, 5000);
</script>
</body>
</html>
