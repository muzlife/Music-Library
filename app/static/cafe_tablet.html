<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
<title>카페 태블릿</title>
<style>
:root{--bg:#0a0f14;--surface:rgba(20,28,36,0.96);--border:rgba(132,148,170,0.18);--text:#eef3f8;--muted:#8899aa;--accent:#f07b3f}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden}
/* left: now-playing (2/3) */
.np{flex:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;border-right:1px solid var(--border)}
.np img{width:min(400px,80%);height:min(400px,80%);border-radius:16px;object-fit:cover;box-shadow:0 8px 48px rgba(0,0,0,.6);margin-bottom:20px}
.np .song{font-size:1.5rem;font-weight:700;line-height:1.3;max-width:90%}
.np .artist{font-size:1.2rem;color:var(--muted);margin-top:6px}
.np .album{font-size:.9rem;color:var(--muted);margin-top:4px;opacity:.6}
.np .idle{font-size:1.1rem;color:var(--muted);opacity:.4}
/* right: search (1/3) */
.sr{flex:1;display:flex;flex-direction:column;min-width:280px}
.sr .top{padding:12px;flex-shrink:0;display:flex;gap:6px}
.sr .top input{flex:1;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;outline:none}
.sr .top input:focus{border-color:var(--accent)}
.sr .top button{padding:10px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.8rem;cursor:pointer;flex-shrink:0}
.sr .list{flex:1;overflow-y:auto;padding:0 12px 12px}
.card{display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:6px}
.card img{width:40px;height:40px;border-radius:5px;object-fit:cover;flex-shrink:0}
.card .info{flex:1;min-width:0}
.card .title{font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .meta{font-size:.68rem;color:var(--muted)}
.card button{flex-shrink:0;padding:4px 10px;background:var(--accent);color:#fff;border:none;border-radius:5px;font-size:.7rem;cursor:pointer}
.empty{text-align:center;padding:24px 12px;color:var(--muted);font-size:.8rem}
</style>
</head>
<body>
<!-- left 2/3: now-playing -->
<div class="np" id="np">
  <div class="idle">♪ 재생 중인 곡이 없습니다</div>
</div>
<!-- right 1/3: search -->
<div class="sr">
  <div class="top">
    <input type="text" id="q" value="BTS" placeholder="곡명 또는 아티스트...">
    <button id="searchBtn">검색</button>
  </div>
  <div class="list" id="list"><div class="empty">검색 버튼을 눌러주세요</div></div>
</div>
<script>
var DEVICE_ID = localStorage.getItem('cafe_device_id') || (function(){var id=crypto.randomUUID();localStorage.setItem('cafe_device_id',id);return id})();
var _data = [];

document.getElementById('searchBtn').onclick = function(){
  var q = document.getElementById('q').value.trim();
  if(!q) return;
  var list = document.getElementById('list');
  list.innerHTML = '<div class="empty">검색중...</div>';
  fetch('/cafe/search?q='+encodeURIComponent(q)+'&limit=10&_='+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){
      _data = d.items || [];
      list.innerHTML = '';
      if(!_data.length){ list.innerHTML = '<div class="empty">결과 없음</div>'; return; }
      for(var i=0;i<_data.length;i++){
        var it = _data[i];
        var card = document.createElement('div');
        card.className = 'card';
        if(it.album_art_url){
          var img = document.createElement('img');
          img.src = it.album_art_url; img.alt = '';
          card.appendChild(img);
        } else {
          var ph = document.createElement('div');
          ph.style.cssText = 'width:40px;height:40px;border-radius:5px;background:rgba(132,148,170,0.1);flex-shrink:0';
          card.appendChild(ph);
        }
        var info = document.createElement('div');
        info.className = 'info';
        var t = document.createElement('div');
        t.className = 'title'; t.textContent = it.title;
        var m = document.createElement('div');
        m.className = 'meta'; m.textContent = (it.artist||'')+' - '+it.source;
        info.appendChild(t); info.appendChild(m);
        card.appendChild(info);
        var btn = document.createElement('button');
        btn.textContent = '신청';
        btn.setAttribute('data-idx', i);
        btn.onclick = function(){
          var item = _data[parseInt(this.getAttribute('data-idx'))];
          fetch('/cafe/request',{method:'POST',headers:{'Content-Type':'application/json','x-device-id':DEVICE_ID},body:JSON.stringify({track_title:item.title,artist:item.artist,album_art_url:item.album_art_url||null,source:item.source,spotify_track_id:item.spotify_track_id||null,owned_item_id:item.owned_item_id||null})}).then(function(r){return r.json()}).then(function(d){_polledRequests[d.request_id]={shown:false};alert('요청 접수 완료!')}).catch(function(){alert('요청 실패')});
        };
        card.appendChild(btn);
        list.appendChild(card);
      }
    }).catch(function(e){ list.innerHTML = '<div class="empty">오류</div>'; });
};


var _lastRequestId = null;
var _overlayActive = false;

function showOverlay(rid){
  if(_overlayActive) return;
  _overlayActive = true;
  _lastRequestId = rid;
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('customInput').style.display = 'none';
  document.getElementById('customSend').style.display = 'none';
  setTimeout(function(){ if(_overlayActive) closeOverlay(); }, 30000);
}

function closeOverlay(){
  _overlayActive = false;
  document.getElementById('overlay').style.display = 'none';
}

function customReact(){
  document.getElementById('customInput').style.display = 'block';
  document.getElementById('customSend').style.display = 'block';
  document.getElementById('customInput').focus();
}

function showLyrics(artist,title,fp){
  document.getElementById('lyricsTitle').textContent = title+' - '+artist;
  document.getElementById('lyricsText').textContent = '불러오는 중...';
  document.getElementById('lyricsModal').style.display = 'flex';
  fetch('/cafe/lyrics?artist='+encodeURIComponent(artist||'')+'&title='+encodeURIComponent(title||'')+'&file_path='+encodeURIComponent(fp||''))
  .then(function(r){return r.json()}).then(function(d){
    if(d.available){
      document.getElementById('lyricsText').textContent = d.lyrics;
    } else {
      document.getElementById('lyricsText').textContent = '가사 정보가 없습니다';
    }
  }).catch(function(){document.getElementById('lyricsText').textContent = '오류'});
}

function react(type){
  var freeText = type === 'CUSTOM' ? document.getElementById('customInput').value.trim() : null;
  fetch('/cafe/reaction',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-device-id':DEVICE_ID},
    body:JSON.stringify({track_request_id:_lastRequestId, reaction_type:type, free_text:freeText||null})
  }).then(function(r){return r.json()}).then(function(){
    closeOverlay();
    if(type === 'CUSTOM') document.getElementById('customInput').value = '';
  }).catch(function(){});
}

// Poll for request status changes
var _polledRequests = {};
setInterval(function(){
  fetch('/cafe/queue?limit=30').then(function(r){return r.json()}).then(function(d){
    for(var i=0;i<d.items.length;i++){
      var item = d.items[i];
      if(item.status === 'PLAYING' && _polledRequests[item.id]){
        // Our request just started playing - show overlay
        if(!_polledRequests[item.id].shown){
          _polledRequests[item.id].shown = true;
          showOverlay(item.id);
        }
      }
    }
  }).catch(function(){});
}, 5000);

setInterval(function(){
  fetch('/cafe/now-playing').then(function(r){return r.json()}).then(function(d){
    var np = document.getElementById('np');
    if(d.available){
      var lyrBtn = d.source==='local'&&d.file_path?'<button onclick="showLyrics(\''+d.file_path+'\')" style="margin-top:10px;background:var(--surface);border:1px solid var(--border);color:var(--accent);padding:6px 16px;border-radius:20px;font-size:.78rem;cursor:pointer">📝 가사 보기</button>':'';
np.innerHTML = '<img src="'+(d.album_art_url||'')+'" alt=""><div class="song">'+d.title+'</div><div class="artist">'+d.artist+'</div><div class="album">'+d.album_name+'</div>'+lyrBtn;
    } else {
      np.innerHTML = '<div class="idle">♪ 재생 중인 곡이 없습니다</div>';
    }
  }).catch(function(){});
}, 3000);
</script>

<div id="overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <div style="font-size:1.1rem;text-align:center;color:var(--text);margin-bottom:8px">✨ 지금 재생 중이에요!</div>
  <div id="ovBtns" style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px">
    <button onclick="react('LOVE')" style="padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;cursor:pointer">💕 완전 좋아요</button>
    <button onclick="react('VIBE')" style="padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;cursor:pointer">☕ 분위기 딱이에요</button>
    <button onclick="react('SIMILAR')" style="padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;cursor:pointer">🎵 비슷한 곡 더</button>
    <button onclick="react('WEATHER')" style="padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;cursor:pointer">🌧️ 오늘 날씨랑 찰떡</button>
    <button onclick="customReact()" style="padding:12px 18px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;cursor:pointer">✍️ 직접 쓰기</button>
  </div>
  <input type="text" id="customInput" placeholder="50자 이내로 입력..." maxlength="50" style="display:none;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.85rem;width:260px;outline:none">
  <button id="customSend" onclick="react('CUSTOM')" style="display:none;padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:.8rem;cursor:pointer">전송</button>
  <button onclick="closeOverlay()" style="margin-top:12px;background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer">닫기</button>
</div>


<div id="lyricsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;flex-direction:column;align-items:center;padding:40px 20px;overflow-y:auto">
  <div id="lyricsTitle" style="font-size:1.1rem;font-weight:600;color:var(--text);margin-bottom:20px;text-align:center"></div>
  <pre id="lyricsText" style="font-size:.9rem;color:var(--muted);line-height:1.8;white-space:pre-wrap;text-align:center;max-width:500px"></pre>
  <button onclick="document.getElementById('lyricsModal').style.display='none'" style="margin-top:24px;background:var(--accent);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:.85rem;cursor:pointer">닫기</button>
</div>

</body>
</html>
