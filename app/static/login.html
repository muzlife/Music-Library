<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라이브러리 로그인</title>
  <style>
    :root {
      --brand: #0f766e;
      --danger: #dc2626;
    }

    body {
      --paper: rgba(18, 23, 29, 0.98);
      --ink: #eef3f8;
      --muted: #b3bfcc;
      --line: rgba(137, 151, 171, 0.22);
      --app-body-background:
        radial-gradient(1200px 620px at 0% -12%, rgba(232, 98, 10, 0.14) 0%, transparent 54%),
        radial-gradient(960px 520px at 100% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 46%),
        linear-gradient(180deg, #06090d 0%, #0a1016 48%, #06090d 100%);
      --theme-shell-surface: rgba(10, 14, 20, 0.98);
      --theme-shell-surface-2: rgba(22, 29, 38, 0.98);
      --theme-shell-border: rgba(132, 148, 170, 0.26);
      --theme-shell-text: #eef3f8;
      --theme-shell-text-muted: #b3bfcc;
      --theme-shell-text-subtle: #a2afbe;
      --theme-shell-accent: #e8620a;
      --theme-admin-panel-bg: rgba(19, 25, 33, 0.98);
      --theme-admin-panel-bg-2: rgba(9, 13, 18, 0.98);
      --theme-admin-text: #f2f6fb;
      --theme-admin-text-muted: #d0d9e4;
      --theme-admin-text-meta: #b6c3d2;
      --theme-dashboard-text: #f3f6fb;
      --theme-dashboard-text-muted: #a4b1c0;
      --theme-dashboard-border: rgba(132, 148, 170, 0.24);
    }

    body[data-theme="night"] {
      --paper: rgba(18, 23, 29, 0.98);
      --ink: #eef3f8;
      --muted: #b3bfcc;
      --line: rgba(137, 151, 171, 0.22);
      --app-body-background:
        radial-gradient(1200px 620px at 0% -12%, rgba(232, 98, 10, 0.14) 0%, transparent 54%),
        radial-gradient(960px 520px at 100% 0%, rgba(56, 189, 248, 0.08) 0%, transparent 46%),
        linear-gradient(180deg, #06090d 0%, #0a1016 48%, #06090d 100%);
      --theme-shell-surface: rgba(10, 14, 20, 0.98);
      --theme-shell-surface-2: rgba(22, 29, 38, 0.98);
      --theme-shell-border: rgba(132, 148, 170, 0.26);
      --theme-shell-text: #eef3f8;
      --theme-shell-text-muted: #b3bfcc;
      --theme-shell-text-subtle: #a2afbe;
      --theme-shell-accent: #e8620a;
      --theme-admin-panel-bg: rgba(19, 25, 33, 0.98);
      --theme-admin-panel-bg-2: rgba(9, 13, 18, 0.98);
      --theme-admin-text: #f2f6fb;
      --theme-admin-text-muted: #d0d9e4;
      --theme-admin-text-meta: #b6c3d2;
      --theme-dashboard-text: #f3f6fb;
      --theme-dashboard-text-muted: #a4b1c0;
      --theme-dashboard-border: rgba(132, 148, 170, 0.24);
    }

    body[data-theme="paper"] {
      --paper: #fffef9;
      --ink: #1f2a37;
      --muted: #5a6270;
      --line: #d9e0e5;
      --app-body-background: #f6f6f1;
      --theme-shell-surface: rgba(255, 254, 249, 0.98);
      --theme-shell-surface-2: rgba(246, 246, 241, 0.98);
      --theme-shell-border: rgba(107, 114, 128, 0.16);
      --theme-shell-text: #1f2a37;
      --theme-shell-text-muted: #5a6270;
      --theme-shell-text-subtle: #838995;
      --theme-shell-accent: #0d6660;
      --theme-admin-panel-bg: rgba(255, 254, 249, 0.98);
      --theme-admin-panel-bg-2: rgba(246, 246, 241, 0.98);
      --theme-admin-text: #1f2a37;
      --theme-admin-text-muted: #4e5660;
      --theme-admin-text-meta: #6e7480;
      --theme-dashboard-text: #1f2a37;
      --theme-dashboard-text-muted: #5a6270;
      --theme-dashboard-border: rgba(107, 114, 128, 0.14);
    }

    body[data-theme="light"] {
      --paper: #ffffff;
      --ink: #1a1d23;
      --muted: #545a66;
      --line: #e2e4e8;
      --app-body-background: #f3f4f6;
      --theme-shell-surface: #ffffff;
      --theme-shell-surface-2: #f8f9fa;
      --theme-shell-border: rgba(0, 0, 0, 0.08);
      --theme-shell-text: #1a1d23;
      --theme-shell-text-muted: #545a66;
      --theme-shell-text-subtle: #838995;
      --theme-shell-accent: #0f766e;
      --theme-admin-panel-bg: #ffffff;
      --theme-admin-panel-bg-2: #f8f9fa;
      --theme-admin-text: #1a1d23;
      --theme-admin-text-muted: #545a66;
      --theme-admin-text-meta: #838995;
      --theme-dashboard-text: #1a1d23;
      --theme-dashboard-text-muted: #545a66;
      --theme-dashboard-border: rgba(0, 0, 0, 0.06);
    }

    body[data-theme="slate"] {
      --paper: rgba(205, 213, 221, 0.95);
      --ink: #15202b;
      --muted: #2d3a4d;
      --line: rgba(82, 100, 120, 0.38);
      --app-body-background:
        radial-gradient(1200px 620px at 0% -12%, rgba(232, 98, 10, 0.06) 0%, transparent 54%),
        radial-gradient(960px 520px at 100% 0%, rgba(56, 189, 248, 0.04) 0%, transparent 46%),
        linear-gradient(180deg, #94a2ae 0%, #9daab7 48%, #909daa 100%);
      --theme-shell-surface: rgba(198, 207, 216, 0.95);
      --theme-shell-surface-2: rgba(189, 199, 209, 0.98);
      --theme-shell-border: rgba(90, 108, 128, 0.32);
      --theme-shell-text: #15202b;
      --theme-shell-text-muted: #2d3a4d;
      --theme-shell-text-subtle: #506275;
      --theme-shell-accent: #c86516;
      --theme-admin-panel-bg: rgba(198, 207, 216, 0.95);
      --theme-admin-panel-bg-2: rgba(189, 199, 209, 0.98);
      --theme-admin-text: #15202b;
      --theme-admin-text-muted: #2d3a4d;
      --theme-admin-text-meta: #506275;
      --theme-dashboard-text: #15202b;
      --theme-dashboard-text-muted: #394b5f;
      --theme-dashboard-border: rgba(90, 108, 128, 0.24);
    }

    body[data-theme="ink"] {
      --paper: rgba(18, 24, 32, 0.98);
      --ink: #e6edf3;
      --muted: #8b949e;
      --line: rgba(110, 118, 129, 0.24);
      --app-body-background: #0d1117;
      --theme-shell-surface: rgba(13, 17, 23, 0.98);
      --theme-shell-surface-2: rgba(22, 28, 36, 0.98);
      --theme-shell-border: rgba(110, 118, 129, 0.24);
      --theme-shell-text: #e6edf3;
      --theme-shell-text-muted: #8b949e;
      --theme-shell-text-subtle: #6e7681;
      --theme-shell-accent: #d2991d;
      --theme-admin-panel-bg: rgba(18, 24, 32, 0.98);
      --theme-admin-panel-bg-2: rgba(10, 14, 20, 0.98);
      --theme-admin-text: #e6edf3;
      --theme-admin-text-muted: #8b949e;
      --theme-admin-text-meta: #6e7681;
      --theme-dashboard-text: #e6edf3;
      --theme-dashboard-text-muted: #8b949e;
      --theme-dashboard-border: rgba(110, 118, 129, 0.20);
    }

    body[data-theme="moss"] {
      --paper: rgba(18, 28, 24, 0.98);
      --ink: #dfede4;
      --muted: #8da398;
      --line: rgba(110, 140, 125, 0.24);
      --app-body-background: #0f1714;
      --theme-shell-surface: rgba(15, 23, 20, 0.98);
      --theme-shell-surface-2: rgba(22, 32, 28, 0.98);
      --theme-shell-border: rgba(110, 140, 125, 0.22);
      --theme-shell-text: #dfede4;
      --theme-shell-text-muted: #8da398;
      --theme-shell-text-subtle: #6e8276;
      --theme-shell-accent: #6ba87a;
      --theme-admin-panel-bg: rgba(18, 28, 24, 0.98);
      --theme-admin-panel-bg-2: rgba(10, 18, 15, 0.98);
      --theme-admin-text: #dfede4;
      --theme-admin-text-muted: #8da398;
      --theme-admin-text-meta: #6e8276;
      --theme-dashboard-text: #dfede4;
      --theme-dashboard-text-muted: #8da398;
      --theme-dashboard-border: rgba(110, 140, 125, 0.20);
    }


    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      font-family: "Avenir Next", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--theme-shell-text);
      background: var(--app-body-background);
      background-attachment: fixed;
    }

    /* ── Root grid ── */
    .login-root {
      min-height: 100dvh;
      display: grid;
      grid-template-columns: 54% 1fr;
      grid-template-rows: 1fr;
    }

    /* ── Left panel: library identity ── */
    .login-side {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px 48px 36px;
      border-right: 1px solid var(--theme-shell-border);
      background: linear-gradient(
        160deg,
        color-mix(in srgb, var(--theme-admin-panel-bg) 88%, transparent) 0%,
        color-mix(in srgb, var(--theme-admin-panel-bg-2) 82%, transparent) 100%
      );
      overflow: hidden;
    }

    /* top wordmark */
    .login-wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .login-wordmark-glyph {
      width: 28px;
      height: 28px;
      border: 2px solid var(--theme-shell-accent);
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 3px;
      padding: 4px;
    }

    .login-wordmark-glyph span {
      background: var(--theme-shell-accent);
      display: block;
    }

    .login-wordmark-glyph span:last-child {
      background: transparent;
      border: 1px solid var(--theme-shell-accent);
    }

    .login-wordmark-name {
      font-size: 0.65rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--theme-shell-text-muted);
    }

    /* center display text */
    .login-display {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 24px;
      padding: 32px 0;
    }

    .login-display-headline {
      line-height: 1;
    }

    .login-display-headline .line-1 {
      display: block;
      font-size: clamp(1.4rem, 3.2vw, 2.6rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--theme-shell-text-muted);
      font-variant: small-caps;
    }

    .login-display-headline .line-2 {
      display: block;
      font-size: clamp(3rem, 7vw, 5.8rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--theme-admin-text);
      line-height: 0.92;
    }

    .login-display-rule {
      width: 56px;
      height: 2px;
      background: var(--theme-shell-accent);
    }

    .login-display-sub {
      font-size: 0.82rem;
      color: var(--theme-shell-text-subtle);
      letter-spacing: 0.04em;
      line-height: 1.5;
    }

    /* catalog grid */
    .login-catalog-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
      opacity: 0.9;
    }

    .catalog-cell {
      aspect-ratio: 1;
      border-radius: 2px;
    }

    @keyframes cell-idle {
      0%, 100% { opacity: var(--cell-lo); }
      50% { opacity: var(--cell-hi); }
    }

    .catalog-cell {
      --cell-lo: 0.1;
      --cell-hi: 0.28;
      background: var(--theme-shell-text-muted);
      animation: cell-idle var(--cell-dur, 4s) ease-in-out infinite;
      animation-delay: var(--cell-delay, 0s);
    }

    .catalog-cell.is-accent {
      --cell-lo: 0.22;
      --cell-hi: 0.62;
      background: var(--theme-shell-accent);
      animation-duration: var(--cell-dur, 3.2s);
    }

    .catalog-cell.is-sky {
      --cell-lo: 0.12;
      --cell-hi: 0.44;
      background: rgb(56, 189, 248);
      animation-duration: var(--cell-dur, 5s);
    }

    /* stats row */
    .login-stats {
      display: flex;
      gap: 36px;
    }

    .login-stat-value {
      display: block;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--theme-admin-text);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }

    .login-stat-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--theme-shell-text-subtle);
      margin-top: 1px;
    }

    /* ── Right panel: login form ── */
    .login-main {
      display: flex;
      flex-direction: column;
      padding: 28px 40px 36px;
    }

    .login-main-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 360px;
      margin: 0 auto;
      width: 100%;
    }

    /* utility bar */
    .login-shell-utility {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      margin-bottom: auto;
      padding-bottom: 40px;
    }

    /* form area */
    .login-form-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 28px;
      padding: 20px 0 40px;
    }

    .login-hero h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--theme-admin-text);
      margin-bottom: 8px;
    }

    .login-hero p {
      font-size: 0.8rem;
      color: var(--theme-shell-text-muted);
      line-height: 1.55;
    }

    /* fields */
    .login-fields {
      display: grid;
      gap: 16px;
    }

    .field-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--theme-admin-text-muted);
    }

    .field-group input {
      width: 100%;
      border-radius: 6px;
      border: 1px solid var(--theme-shell-border);
      padding: 10px 12px;
      font-size: 0.9rem;
      line-height: 1.2;
      font-family: inherit;
      color: #0f172a;
      background: #fff;
      transition: border-color 140ms, box-shadow 140ms;
    }

    .field-group input {
      color: var(--ink);
      background: var(--paper);
      border-color: var(--line);
    }
    body[data-theme="night"] .field-group input,
    body[data-theme="ink"] .field-group input,
    body[data-theme="moss"] .field-group input {
      color: var(--theme-admin-text);
      background: color-mix(in srgb, var(--theme-admin-panel-bg-2) 92%, var(--theme-shell-text) 8%);
    }

    .field-group input:focus {
      outline: none;
      border-color: var(--theme-shell-accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme-shell-accent) 18%, transparent);
    }

    /* submit */
    #loginSubmitBtn {
      width: 100%;
      border: none;
      border-radius: 6px;
      padding: 11px 14px;
      font-size: 0.88rem;
      font-weight: 800;
      font-family: inherit;
      letter-spacing: 0.04em;
      color: #fff;
      background: var(--theme-shell-accent);
      cursor: pointer;
      transition: opacity 120ms, transform 80ms;
    }

    #loginSubmitBtn:hover:not(:disabled) { opacity: 0.92; }
    #loginSubmitBtn:active:not(:disabled) { transform: scale(0.99); }
    #loginSubmitBtn:disabled { opacity: 0.6; cursor: default; }

    /* status */
    .status {
      min-height: 18px;
      font-size: 0.76rem;
      color: var(--theme-shell-text-muted);
    }

    .status.err { color: var(--danger); }

    /* ── Utility controls (shared with old page) ── */
    .shell-locale-picker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 28px;
      padding: 0 8px;
      border: 1px solid color-mix(in srgb, var(--theme-shell-border) 88%, transparent);
      border-radius: 6px;
      background: var(--theme-shell-surface-2);
      color: var(--theme-shell-text);
      font-size: 0.72rem;
      font-weight: 700;
      white-space: nowrap;
      min-width: 96px;
    }

    .shell-locale-picker-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      color: var(--theme-shell-text-muted);
      flex: 0 0 auto;
    }

    .shell-locale-picker-icon svg {
      width: 100%;
      height: 100%;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shell-locale-picker select {
      appearance: none;
      -webkit-appearance: none;
      border: none;
      background: transparent;
      color: inherit;
      font-family: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      min-width: 68px;
      outline: none;
    }

    .shell-theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px 0 6px;
      min-width: 0;
      height: 28px;
      border: 1px solid var(--theme-shell-border);
      border-radius: 999px;
      background: var(--theme-shell-surface-2);
      color: var(--theme-shell-text);
      font-size: 0.72rem;
      font-weight: 600;
      line-height: 1;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
    }

    .shell-theme-toggle:hover {
      border-color: var(--theme-shell-accent);
      background: color-mix(in srgb, var(--theme-shell-surface-2) 92%, var(--theme-shell-accent) 8%);
    }

    .shell-theme-toggle:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme-shell-accent) 24%, transparent);
      border-color: var(--theme-shell-accent);
    }

    .shell-theme-toggle:active {
      transform: scale(0.97);
    }

    .theme-cycle-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--theme-shell-accent);
      flex-shrink: 0;
      box-shadow: 0 0 0 2px color-mix(in srgb, var(--theme-shell-accent) 18%, transparent);
    }

    .theme-cycle-label {
      font-variant-numeric: tabular-nums;
    }

    .theme-cycle-chevron {
      width: 10px;
      height: 10px;
      color: var(--theme-shell-text-subtle);
      opacity: 0.55;
      flex-shrink: 0;
    }

    .shell-theme-toggle:hover .theme-cycle-chevron {
      opacity: 0.85;
    }

    /* ── Mobile ── */
    @media (max-width: 720px) {
      .login-root {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .login-side {
        border-right: none;
        border-bottom: 1px solid var(--theme-shell-border);
        padding: 28px 24px 24px;
        flex-direction: row;
        flex-wrap: wrap;
        align-items: flex-end;
        gap: 20px;
        min-height: unset;
      }

      .login-display {
        flex: 1 1 auto;
        padding: 0;
        gap: 12px;
        min-width: 180px;
      }

      .login-display-headline .line-1 { font-size: 0.85rem; }
      .login-display-headline .line-2 { font-size: 2.4rem; }

      .login-catalog-grid {
        display: none;
      }

      .login-stats {
        gap: 20px;
        flex-wrap: wrap;
      }

      .login-wordmark { display: none; }

      .login-main {
        padding: 24px;
      }

      .login-main-inner {
        max-width: 100%;
      }

      .login-shell-utility {
        padding-bottom: 24px;
      }
    }

    @media (max-width: 420px) {
      .login-side { padding: 20px 18px; }
      .login-main { padding: 20px 18px 28px; }
    }
  </style>
</head>

                <path d="M4 7h6"></path><path d="M7 4.5L4 7l3 2.5"></path>
                <path d="M20 17h-6"></path><path d="M17 14.5l3 2.5-3 2.5"></path>
                <path d="M9 18l2.1-6h1.8L15 18"></path><path d="M9.8 15.5h4.4"></path>
                <path d="M15.8 6.2h3.2"></path><path d="M17.4 6.2v6"></path>
                <path d="M15.8 12.2h3.2"></path>
              </svg>
            </span>
            <span id="loginLocaleLabel" class="sr-only"></span>
            <select id="loginLocaleSelect" aria-label="language selector">
              <option value="ko" data-login-i18n="locale.option.ko"></option>
              <option value="en" data-login-i18n="locale.option.en"></option>
              <option value="ja" data-login-i18n="locale.option.ja"></option>
            </select>
          </label>
          <button id="loginThemeToggle" class="shell-theme-toggle" type="button" title="테마 전환" aria-label="테마 전환">
          <span class="theme-cycle-dot" aria-hidden="true"></span>
          <span id="loginThemeToggleText" class="theme-cycle-label">Night</span>
          <svg class="theme-cycle-chevron" viewBox="0 0 12 12" aria-hidden="true"><path d="M3 5l3 3 3-3" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        </div>

        <div class="login-form-area">
          <div class="login-hero">
            <h1 id="loginHeading">로그인</h1>
            <p id="loginSubcopy">외부 접근용 로그인 화면입니다. 관리자 계정은 전체 관리 화면으로, 현장 운영자 계정은 조회/요청곡 중심 화면으로 들어갑니다.</p>
          </div>

          <form id="loginForm" class="login-fields" novalidate>
            <div class="field-group">
              <label for="loginUsername" id="loginUsernameLabel">아이디</label>
              <input id="loginUsername" name="username" autocomplete="username" required />
            </div>
            <div class="field-group">
              <label for="loginPassword" id="loginPasswordLabel">비밀번호</label>
              <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
            </div>
            <button id="loginSubmitBtn" type="submit">로그인</button>
            <div id="loginStatus" class="status"></div>
          </form>
        </div>

      </div>
    </main>
  </div>

  <script>
    /* ── Catalog grid generation ── */
    (function buildCatalogGrid() {
      const grid = document.getElementById("catalogGrid");
      if (!grid) return;
      const COLS = 10, ROWS = 6, TOTAL = COLS * ROWS;
      const ACCENT_IDX = new Set([3, 12, 27, 38, 44, 51]);
      const SKY_IDX    = new Set([8, 19, 31, 42, 55]);
      const DURS = [3.2, 4.1, 5.0, 3.8, 4.6, 2.9, 5.4, 3.5];
      const DELAYS = [-0.8, -1.6, -2.4, -3.2, -0.4, -2.0, -1.2, -3.6, -0.0, -2.8];
      for (let i = 0; i < TOTAL; i++) {
        const cell = document.createElement("span");
        cell.className = "catalog-cell" +
          (ACCENT_IDX.has(i) ? " is-accent" : "") +
          (SKY_IDX.has(i) ? " is-sky" : "");
        cell.style.setProperty("--cell-dur",   DURS[i % DURS.length] + "s");
        cell.style.setProperty("--cell-delay", DELAYS[i % DELAYS.length] + "s");
        grid.appendChild(cell);
      }
    })();

    /* ── Catalog stats (dynamic count from server) ── */
    (function loadCatalogStats() {
      const el = document.getElementById("loginCatalogCount");
      if (!el) return;
      fetch("/catalog-stats")
        .then(function(r) { return r.ok ? r.json() : Promise.reject(r.status); })
        .then(function(data) {
          const n = Number(data.total_items);
          if (!isNaN(n) && n > 0) {
            el.textContent = n.toLocaleString("ko-KR") + "+";
          }
        })
        .catch(function() { el.textContent = "—"; });
    })();

    /* ── i18n & theme logic (preserved) ── */
    const LOGIN_LOCALE_STORAGE_KEY = "__PROJECT_SLUG__.appLocale.v1";
    const LOGIN_THEME_STORAGE_KEY  = "__PROJECT_SLUG__.uiTheme.v1";
    const LOGIN_SUPPORTED_LOCALES  = new Set(["ko", "en", "ja"]);
    let loginLocale = "ko";
    let loginTheme  = "night";
    let loginStatusCopyKind = "idle";
    let loginStatusCopyText = "";

    const LOGIN_MESSAGES = {
      ko: {
        "login.title": "라이브러리 로그인",
        "login.heading": "로그인",
        "login.description": "외부 접근용 로그인 화면입니다. 관리자 계정은 전체 관리 화면으로, 현장 운영자 계정은 조회/요청곡 중심 화면으로 들어갑니다.",
        "login.username": "아이디",
        "login.password": "비밀번호",
        "login.submit": "로그인",
        "login.loading": "로그인 중...",
        "login.error_default": "로그인 실패",
        "login.error.invalid_credentials": "아이디 또는 비밀번호가 올바르지 않습니다.",
        "utility.language": "언어",
        "locale.option.ko": "한국어",
        "locale.option.en": "EN",
        "locale.option.ja": "日本語",
        "utility.theme.day": "주간",
        "utility.theme.night": "야간",
        "utility.theme.switch_to_day": "주간 모드로 전환",
        "utility.theme.switch_to_night": "야간 모드로 전환",
      },
      en: {
        "login.title": "Library Login",
        "login.heading": "Sign In",
        "login.description": "External login page. Admin accounts open the full management console, while operator accounts open a read-heavy operations interface.",
        "login.username": "Username",
        "login.password": "Password",
        "login.submit": "Sign in",
        "login.loading": "Signing in...",
        "login.error_default": "Login failed",
        "login.error.invalid_credentials": "Incorrect username or password.",
        "utility.language": "Language",
        "locale.option.ko": "Korean",
        "locale.option.en": "English",
        "locale.option.ja": "Japanese",
        "utility.theme.day": "Day",
        "utility.theme.night": "Night",
        "utility.theme.switch_to_day": "Switch to day mode",
        "utility.theme.switch_to_night": "Switch to night mode",
      },
      ja: {
        "login.title": "ライブラリ ログイン",
        "login.heading": "ログイン",
        "login.description": "外部アクセス用ログイン画面です。管理者アカウントは全体管理画面に、現場運用者アカウントは参照中心の画面に進みます。",
        "login.username": "ユーザー名",
        "login.password": "パスワード",
        "login.submit": "ログイン",
        "login.loading": "ログイン中...",
        "login.error_default": "ログイン失敗",
        "login.error.invalid_credentials": "ユーザー名またはパスワードが正しくありません。",
        "utility.language": "言語",
        "locale.option.ko": "韓国語",
        "locale.option.en": "英語",
        "locale.option.ja": "日本語",
        "utility.theme.day": "デイモード",
        "utility.theme.night": "ナイトモード",
        "utility.theme.switch_to_day": "デイモードに切り替え",
        "utility.theme.switch_to_night": "ナイトモードに切り替え",
      },
    };

    const $ = (id) => document.getElementById(id);
    const form          = $("loginForm");
    const statusEl      = $("loginStatus");
    const submitBtn     = $("loginSubmitBtn");
    const usernameInput = $("loginUsername");
    const usernameLabel = $("loginUsernameLabel");
    const passwordInput = $("loginPassword");
    const passwordLabel = $("loginPasswordLabel");
    const headingEl     = $("loginHeading");
    const descEl        = $("loginSubcopy");
    const localeLabelEl = $("loginLocaleLabel");
    const localeSelect  = $("loginLocaleSelect");
    const themeToggle   = $("loginThemeToggle");
    const themeToggleText = $("loginThemeToggleText");

    function normalizeLoginLocale(locale) {
      const candidate = String(locale || "").trim();
      return LOGIN_SUPPORTED_LOCALES.has(candidate) ? candidate : "ko";
    }
    function loadLoginLocale() {
      try { return normalizeLoginLocale(window.localStorage.getItem(LOGIN_LOCALE_STORAGE_KEY)); }
      catch (_) { return "ko"; }
    }
    function saveLoginLocale(locale) {
      const normalized = normalizeLoginLocale(locale);
      try { window.localStorage.setItem(LOGIN_LOCALE_STORAGE_KEY, normalized); } catch (_) {}
      return normalized;
    }
    function normalizeLoginTheme(theme) {
      const normalized = String(theme || "").trim().toLowerCase();
      if (normalized === "day") return "light";
      return {night:1,light:1,paper:1,slate:1,ink:1,moss:1}[normalized] ? normalized : "night";
    }
    function loadLoginTheme() {
      try { return normalizeLoginTheme(window.localStorage.getItem(LOGIN_THEME_STORAGE_KEY)); }
      catch (_) { return "night"; }
    }
    function saveLoginTheme(theme) {
      const normalized = normalizeLoginTheme(theme);
      try { window.localStorage.setItem(LOGIN_THEME_STORAGE_KEY, normalized); } catch (_) {}
      return normalized;
    }
    function messageByLoginLocale(key) {
      const table = LOGIN_MESSAGES[loginLocale] || LOGIN_MESSAGES.ko;
      return table?.[key] || LOGIN_MESSAGES.ko?.[key] || "";
    }
    function syncLoginLocaleSelect() {
      if (!localeSelect) return;
      localeSelect.value = loginLocale;
      Array.from(localeSelect.options || []).forEach((option) => {
        const value = String(option.value || "").trim();
        const nextText = messageByLoginLocale(`locale.option.${value}`);
        if (nextText) option.textContent = nextText;
      });
      if (localeLabelEl) localeLabelEl.textContent = messageByLoginLocale("utility.language");
    }
    function syncLoginThemeToggle() {
      if (!themeToggle) return;
      const themeLabel = ({"night":"Night","ink":"Ink","moss":"Moss","light":"Light","paper":"Paper","slate":"Slate"})[loginTheme] || loginTheme;
      themeToggle.setAttribute("title", "Theme: " + themeLabel + " — click to cycle");
      themeToggle.setAttribute("aria-label", "Current theme: " + themeLabel + ". Click to cycle through themes.");
      if (themeToggleText) {
        themeToggleText.textContent = themeLabel;
      }
    }
    function applyLoginTheme(theme = loginTheme) {
      loginTheme = saveLoginTheme(theme);
      document.body.dataset.theme = loginTheme;
      syncLoginThemeToggle();
    }
    function applyLoginLocale(locale = loginLocale) {
      loginLocale = saveLoginLocale(locale);
      document.documentElement.lang = loginLocale;
      syncLoginLocaleSelect();
      syncLoginThemeToggle();
      rerenderLoginCopy();
    }
    function rerenderLoginCopy() {
      if (headingEl) headingEl.textContent = messageByLoginLocale("login.heading");
      if (document && document.title != null) document.title = messageByLoginLocale("login.title");
      if (descEl) descEl.textContent = messageByLoginLocale("login.description");
      if (usernameLabel) usernameLabel.textContent = messageByLoginLocale("login.username");
      if (passwordLabel) passwordLabel.textContent = messageByLoginLocale("login.password");
      if (submitBtn) submitBtn.textContent = messageByLoginLocale("login.submit");
      if (!document || !statusEl) return;
      if (loginStatusCopyKind === "loading") { statusEl.textContent = messageByLoginLocale("login.loading"); return; }
      if (loginStatusCopyKind === "invalid_credentials") { statusEl.textContent = messageByLoginLocale("login.error.invalid_credentials"); return; }
      if (loginStatusCopyKind === "default_error") { statusEl.textContent = messageByLoginLocale("login.error_default"); return; }
      if (loginStatusCopyKind === "passthrough" && loginStatusCopyText) statusEl.textContent = loginStatusCopyText;
    }
    function localizeAuthFailureText(statusCode, rawDetail) {
      const detail = String(rawDetail || "").trim();
      if (Number(statusCode) === 401 && detail === "아이디 또는 비밀번호가 올바르지 않습니다.") {
        return messageByLoginLocale("login.error.invalid_credentials");
      }
      return detail;
    }
    function parseLoginErrorDetail(statusCode, text) {
      const message = String(text || "").trim();
      if (!message) return messageByLoginLocale("login.error_default");
      return localizeAuthFailureText(statusCode, message);
    }
    function toggleLoginTheme() { const cycle = ["night","ink","moss","light","paper","slate"]; const idx = cycle.indexOf(loginTheme); applyLoginTheme(cycle[(idx + 1) % cycle.length]); }
    function wireLoginShellControls() {
      localeSelect?.addEventListener("change", (e) => applyLoginLocale(e.target.value));
      themeToggle?.addEventListener("click", toggleLoginTheme);
    }
    function bootstrapLoginLocaleAndTheme() {
      loginTheme = loadLoginTheme();
      applyLoginTheme(loginTheme);
      loginLocale = loadLoginLocale();
      applyLoginLocale(loginLocale);
    }

    usernameInput?.focus();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginStatusCopyKind = "loading";
      loginStatusCopyText = "";
      statusEl.className = "status";
      statusEl.textContent = messageByLoginLocale("login.loading");
      submitBtn.disabled = true;
      try {
        const payload = new URLSearchParams(new FormData(form));
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: payload.toString(),
          credentials: "include",
        });
        const text = await res.text();
        let data = {};
        try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { detail: text }; }
        if (!res.ok) {
          const detail = data && typeof data === "object" && "detail" in data ? data.detail : text;
          const rawDetail = String(detail || "").trim();
          if (!rawDetail) {
            loginStatusCopyKind = "default_error"; loginStatusCopyText = "";
          } else if (res.status === 401 && rawDetail === "아이디 또는 비밀번호가 올바르지 않습니다.") {
            loginStatusCopyKind = "invalid_credentials"; loginStatusCopyText = "";
          } else {
            loginStatusCopyKind = "passthrough";
            loginStatusCopyText = parseLoginErrorDetail(res.status, rawDetail);
          }
          throw new Error(parseLoginErrorDetail(res.status, detail));
        }
        const urlParams = new URLSearchParams(window.location.search);
        const nextParam = urlParams.get("next");
        if (nextParam && nextParam.startsWith("/")) {
          window.location.replace(nextParam);
          return;
        }

        const _opsHost = window.location.hostname.replace(/^(qa-)?library\./, "$1ops.");
        const _isOpsDomain = /^(qa-)?ops\./.test(window.location.hostname);
        const isDevOrLocal = window.location.port !== "" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

        if (_isOpsDomain) {
          window.location.replace("/");
        } else if (data.role === "ADMIN") {
          window.location.replace("/");
        } else if (isDevOrLocal) {
          window.location.replace("/ops");
        } else {
          // 운영자 계정 → 안내 팝업 후 ops 도메인으로 이동
          const _opsUrl = `https://${_opsHost}/`;
          const _overlay = document.createElement("div");
          _overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:9999;";
          _overlay.innerHTML = `<div style="background:#fff;border-radius:16px;padding:32px 36px;max-width:360px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
            <div style="font-size:1.8rem;margin-bottom:12px;">🎵</div>
            <p style="font-size:1rem;font-weight:700;color:#0F172A;margin:0 0 8px;">운영자 계정으로 로그인했습니다.</p>
            <p style="font-size:0.85rem;color:#64748B;margin:0 0 20px;"><strong style="color:#4F6AF6;">${_opsHost}</strong>으로 이동합니다.</p>
            <div id="_opsRedirectBar" style="height:4px;background:#E2E8F0;border-radius:2px;overflow:hidden;"><div id="_opsRedirectFill" style="height:100%;width:0%;background:#4F6AF6;transition:width 2.8s linear;"></div></div>
          </div>`;
          document.body.appendChild(_overlay);
          requestAnimationFrame(() => { document.getElementById("_opsRedirectFill").style.width = "100%"; });
          setTimeout(() => window.location.replace(_opsUrl), 3000);
        }
      } catch (error) {
        if (loginStatusCopyKind === "loading") {
          loginStatusCopyKind = "passthrough";
          loginStatusCopyText = String(error?.message || messageByLoginLocale("login.error_default"));
        }
        statusEl.className = "status err";
        statusEl.textContent = String(error?.message || messageByLoginLocale("login.error_default"));
        submitBtn.disabled = false;
      }
    });

    bootstrapLoginLocaleAndTheme();
    wireLoginShellControls();
  </script>
</body>
</html>
