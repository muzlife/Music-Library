<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>라이브러리 로그인</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --paper: #ffffff;
      --ink: #1f2a37;
      --muted: #64748b;
      --line: #d4dbe3;
      --brand: #0f766e;
      --danger: #b91c1c;
      --shadow: 0 16px 40px rgba(15, 23, 42, 0.1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1200px 500px at 10% -10%, #bae6fd 0%, transparent 60%),
        radial-gradient(900px 450px at 100% 0%, #fed7aa 0%, transparent 55%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .login-card {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 20px 18px;
      display: grid;
      gap: 12px;
    }
    .login-hero {
      display: grid;
      gap: 4px;
    }
    .login-hero h1 {
      margin: 0;
      font-size: 1.15rem;
      color: #0f172a;
    }
    .login-hero p {
      margin: 0;
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.35;
    }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 0.76rem;
      font-weight: 700;
      color: #334155;
    }
    input {
      width: 100%;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 8px 10px;
      font-size: 0.92rem;
      line-height: 1.2;
      color: #0f172a;
      background: #fff;
    }
    input:focus {
      outline: none;
      border-color: #0891b2;
      box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.12);
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 0.92rem;
      font-weight: 800;
      color: #f0fdfa;
      background: var(--brand);
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: default;
    }
    .status {
      min-height: 18px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .status.err {
      color: var(--danger);
    }
  </style>
</head>
<body>
  <form id="loginForm" class="login-card">
    <div class="login-hero">
      <h1>라이브러리 관리/운영 콘솔</h1>
      <p>외부 접근용 로그인 화면입니다. 관리자 계정은 전체 관리 화면으로, 현장 운영자 계정은 조회/요청곡 중심 화면으로 들어갑니다.</p>
    </div>
    <div>
      <label for="loginUsername">아이디</label>
      <input id="loginUsername" name="username" autocomplete="username" required />
    </div>
    <div>
      <label for="loginPassword">비밀번호</label>
      <input id="loginPassword" name="password" type="password" autocomplete="current-password" required />
    </div>
    <button id="loginSubmitBtn" type="submit">로그인</button>
    <div id="loginStatus" class="status"></div>
  </form>
  <script>
    const form = document.getElementById("loginForm");
    const statusEl = document.getElementById("loginStatus");
    const submitBtn = document.getElementById("loginSubmitBtn");
    const usernameInput = document.getElementById("loginUsername");

    usernameInput?.focus();

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      statusEl.className = "status";
      statusEl.textContent = "로그인 중...";
      submitBtn.disabled = true;

      try {
        const payload = new URLSearchParams(new FormData(form));
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/x-www-form-urlencoded",
          },
          body: payload.toString(),
        });
        const text = await res.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch (_) {
          data = { detail: text };
        }
        if (!res.ok) {
          throw new Error(data.detail || "로그인 실패");
        }
        window.location.replace("/ops");
      } catch (error) {
        statusEl.className = "status err";
        statusEl.textContent = error.message || "로그인 실패";
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
